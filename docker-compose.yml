services:
  app:
    image: ghcr.io/mdeabreu/quotify3d:latest
    platform: linux/amd64
    build:
      context: .
      target: runner
      platforms:
        - linux/amd64
    env_file:
      - .env
    environment:
      DATABASE_URL: file:./data/ecommerce.db
      NODE_ENV: production
      PORT: 3000
      SLICER_BINARY_PATH: /opt/orcaslicer/AppRun
    ports:
      - '3000:3000'
    restart: unless-stopped
    volumes:
      - ./data:/app/data

  importer:
    image: ghcr.io/mdeabreu/quotify3d-importer:latest
    platform: linux/amd64
    build:
      context: .
      target: importer
      platforms:
        - linux/amd64
    env_file:
      - .env
    environment:
      DATABASE_URL: file:./data/ecommerce.db
      NODE_ENV: production
      ORCASLICER_PROFILES_DIR: /opt/orcaslicer/resources/profiles
    profiles:
      - tools
    stdin_open: true
    tty: true
    volumes:
      - ./data:/app/data
